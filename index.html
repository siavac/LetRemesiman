<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIAVAC - Lèt Remèsiman</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
background:#eef0f2;
font-family:Arial;
padding:10px;
}

.container{
max-width:800px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.15);
}

/* HEADER */
.header{
text-align:center;
margin-bottom:15px;
}

.header img{
width:90px;
height:90px;
object-fit:contain;
}

.header h1{
color:#003366;
font-size:24px;
}

.header h2{
font-size:14px;
color:#444;
}

/* SECTION */
.section-title{
background:#003366;
color:#fff;
padding:8px;
margin-top:15px;
border-radius:5px;
font-size:15px;
}

label{
font-weight:bold;
font-size:13px;
display:block;
margin-top:10px;
}

input,textarea{
width:100%;
padding:10px;
border:1px solid #aaa;
border-radius:6px;
font-size:14px;
}

textarea{
min-height:100px;
resize:vertical;
}

/* LETTER STYLE */
.letter{
margin-top:15px;
line-height:24px;
font-size:14px;
text-align:justify;
}

/* BUTTON */
button{
width:100%;
margin-top:20px;
padding:12px;
background:#003366;
color:#fff;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0050a5;
}

/* SIGNATURE */
.signature{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
margin-top:40px;
}

.signature div{
width:100%;
text-align:center;
}

.line{
border-top:1px solid #000;
margin-top:45px;
}

@media(min-width:768px){
.signature div{width:40%}
}

@media print{
button{display:none}
}

</style>

</head>

<body>

<div class="container" id="pdf">

<div class="header">
<img src="https://i.ibb.co/zTz2rrh8/sketch-1782265870898.jpg">
<h1>SIAVAC</h1>
<h2>Service Intelligence AntiVol AntiCrime</h2>
<h2>LÈT REMÈSIMAN OFISYÈL</h2>
</div>

<div class="section-title">ENFÒMASYON ANKÈTÈ</div>

<label>Non Konplè Ankètè</label>
<input type="text">

<label>ID Ajan</label>
<input type="text">

<label>Dosye / Case ID</label>
<input type="text">

<div class="section-title">KONTNI LÈT LA</div>

<div class="letter">

<label>Objektif remèsiman an</label>
<textarea placeholder="Ekri poukisa ou vle remèsye ankètè a"></textarea>

<label>Deskripsyon travay li fè</label>
<textarea placeholder="Eksplike bon travay ankètè a fè nan dosye a"></textarea>

<label>Enpak travay li sou dosye a</label>
<textarea placeholder="Ki rezilta oswa chanjman travay li pote"></textarea>

</div>

<div class="section-title">DEKLARASYON FINAL</div>

<p style="font-size:13px;line-height:22px;text-align:justify;">
SIAVAC rekonèt ak apresye travay ankètè sa a ki kontribye nan bon fonksyònman ankèt la.
Nou swete li kontinye travay ak pwofesyonalis ak disiplin.
</p>

<div class="signature">

<div>
<div class="line"></div>
Siyati Direktè SIAVAC
</div>

<div>
<div class="line"></div>
Dat
</div>

</div>

<button onclick="downloadPDF()">📄 Telechaje Lèt Remèsiman</button>

</div>

<script>
function downloadPDF(){

const element = document.getElementById("pdf");

html2pdf().set({
margin:0.4,
filename:'SIAVAC_Let_Remesiman_Anket.pdf',
image:{type:'jpeg',quality:1},
html2canvas:{
scale:2,
useCORS:true,
scrollY:0,
windowWidth:element.scrollWidth
},
jsPDF:{
unit:'mm',
format:'a4',
orientation:'portrait'
},
pagebreak:{
mode:['css','legacy','avoid-all']
}
}).from(element).save();
}
</script>

</body>
</html>
